; cPanel PHP user.ini — read by mod_php / PHP-FPM on shared hosting.
; Adjust to suit your hosting plan's hard limits. Most cPanel hosts
; cap individual directives; values above the cap are silently clamped.

; Memory
memory_limit = 256M
max_execution_time = 120
max_input_time = 120

; Uploads (resume uploads go up to 2 MB; allow some headroom)
upload_max_filesize = 8M
post_max_size = 10M
max_file_uploads = 20

; Session
session.cookie_httponly = 1
session.cookie_samesite = "Lax"
session.use_strict_mode = 1

; Misc
date.timezone = "UTC"
expose_php = Off
display_errors = Off
log_errors = On

; OPcache (tune on cPanel if "opcache" extension is enabled)
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 192
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
