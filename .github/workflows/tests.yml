name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pint + phpunit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, mbstring, xml, curl, zip, gd, fileinfo, openssl, tokenizer
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy .env for tests
        run: cp .env.example .env

      - name: Generate APP_KEY
        run: php artisan key:generate

      - name: Install JS dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Run Pint (code style, non-blocking)
        # Reports style issues but does not fail the build — the codebase has
        # many pre-existing pint warnings. Tighten this once they're cleared up.
        continue-on-error: true
        run: vendor/bin/pint --test

      - name: Run PHPUnit
        run: vendor/bin/phpunit
        env:
          APP_ENV: testing
