<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create your account — JobBoard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
<style>body{font-family:'Inter',system-ui,sans-serif}</style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

<!-- Header -->
<header class="border-b border-slate-200 bg-white">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2">
      <div class="w-9 h-9 rounded-lg bg-brand-600 text-white grid place-items-center font-bold">JB</div>
      <span class="font-bold text-slate-900 text-lg">JobBoard</span>
    </a>
    <a href="login.html" class="text-sm font-medium text-slate-700 hover:text-slate-900">Already have an account? <span class="text-brand-700">Sign in</span></a>
  </div>
</header>

<main class="flex-1 flex items-start lg:items-center justify-center px-4 py-10">
  <div class="w-full max-w-2xl">
    <div class="text-center">
      <h1 class="text-3xl font-bold text-slate-900">Create your account</h1>
      <p class="text-slate-500 mt-2">Choose how you want to use JobBoard. You can update this later.</p>
    </div>

    <!-- Role selection -->
    <div class="mt-8 grid sm:grid-cols-3 gap-3" id="role-cards">
      <button type="button" data-role="seeker" class="role-card text-left border-2 border-brand-500 bg-brand-50/40 rounded-2xl p-5 hover:border-brand-400 transition">
        <div class="w-10 h-10 rounded-lg bg-brand-100 text-brand-700 grid place-items-center">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div class="mt-3 font-semibold text-slate-900">I'm a job seeker</div>
        <p class="text-sm text-slate-500 mt-1">Find a job, build a profile, track applications.</p>
        <div class="mt-3 text-xs font-semibold text-brand-700">Recommended →</div>
      </button>
      <button type="button" data-role="employer" class="role-card text-left border-2 border-slate-200 rounded-2xl p-5 hover:border-brand-400 transition bg-white">
        <div class="w-10 h-10 rounded-lg bg-slate-100 text-slate-700 grid place-items-center">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </div>
        <div class="mt-3 font-semibold text-slate-900">I'm an employer</div>
        <p class="text-sm text-slate-500 mt-1">Post jobs, find candidates, manage hiring.</p>
      </button>
      <button type="button" data-role="admin" class="role-card text-left border-2 border-slate-200 rounded-2xl p-5 hover:border-brand-400 transition bg-white">
        <div class="w-10 h-10 rounded-lg bg-slate-100 text-slate-700 grid place-items-center">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg>
        </div>
        <div class="mt-3 font-semibold text-slate-900">I'm an admin</div>
        <p class="text-sm text-slate-500 mt-1">Platform operations and moderation.</p>
      </button>
    </div>

    <form class="mt-8 bg-white border border-slate-200 rounded-2xl p-6 space-y-5">
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Full name</label>
          <input type="text" placeholder="Jane Doe" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
          <input type="email" placeholder="you@company.com" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
        <input type="password" placeholder="At least 8 characters" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
        <p class="text-xs text-slate-500 mt-1">Use 8+ characters with a mix of letters, numbers, and symbols.</p>
      </div>

      <!-- Conditional: employer-only field -->
      <div id="employer-fields" class="hidden border-t border-slate-100 pt-5">
        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Company name</label>
            <input type="text" placeholder="Acme Inc." class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Industry</label>
            <select class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
              <option>Technology</option>
              <option>Finance</option>
              <option>Healthcare</option>
              <option>Education</option>
              <option>Other</option>
            </select>
          </div>
        </div>
      </div>

      <label class="flex items-start gap-2 text-sm text-slate-600">
        <input type="checkbox" class="rounded text-brand-600 mt-1" />
        <span>I agree to the <a href="#" class="text-brand-700 hover:underline">Terms of Service</a> and <a href="#" class="text-brand-700 hover:underline">Privacy Policy</a>.</span>
      </label>

      <a href="dashboard-jobseeker.html" class="block w-full text-center bg-brand-600 text-white px-5 py-3 rounded-xl font-semibold hover:bg-brand-700">Create account</a>
    </form>

    <p class="text-center text-sm text-slate-500 mt-6">
      Already a member? <a href="login.html" class="font-semibold text-brand-700 hover:text-brand-800">Sign in</a>
    </p>
  </div>
</main>

<footer class="border-t border-slate-200 bg-white">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 text-xs text-slate-500 flex flex-col sm:flex-row gap-2 sm:items-center sm:justify-between">
    <span>© 2026 JobBoard demo · Static preview</span>
    <a href="index.html" class="hover:text-slate-700">← Back to home</a>
  </div>
</footer>

<script>
  // Lightweight client-side role selection so the preview is interactive.
  const cards = document.querySelectorAll('.role-card');
  const employerFields = document.getElementById('employer-fields');
  cards.forEach(c => c.addEventListener('click', () => {
    cards.forEach(x => { x.classList.remove('border-brand-500', 'bg-brand-50/40'); x.classList.add('border-slate-200', 'bg-white'); });
    c.classList.remove('border-slate-200', 'bg-white');
    c.classList.add('border-brand-500', 'bg-brand-50/40');
    employerFields.classList.toggle('hidden', c.dataset.role !== 'employer');
  }));
</script>
</body>
</html>
